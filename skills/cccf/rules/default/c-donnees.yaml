rules:
  # --- R12 : l'object storage est la source de vérité des fichiers ---

  - id: r12-lob-contenu-fichier-en-base
    languages: [java]
    severity: ERROR
    message: >
      R12 — champ @Lob (ou colonne bytea) sur une entité JPA : PostgreSQL ne
      doit jamais stocker de contenu de fichier. Ne conserver que les
      métadonnées (référence S3 bucket/key, sha256, taille) en base ; le
      contenu reste en object storage.
    metadata:
      regle: R12
      reference: docs/regles-conception.md#r12
    patterns:
      - pattern-either:
          - pattern: |
              @Lob
              $TYPE $FIELD;
          - pattern: |
              @Column(columnDefinition = "bytea")
              $TYPE $FIELD;

  - id: r12-champ-byte-array-sur-entite
    languages: [java]
    severity: WARNING
    message: >
      R12 — champ byte[] sur une entité JPA (@Entity) au nom évoquant un
      contenu de fichier. Vérifier qu'il ne s'agit pas du contenu d'une
      facture/pièce jointe stocké en base : seule une référence S3 doit y
      figurer.
    metadata:
      regle: R12
      reference: docs/regles-conception.md#r12
    patterns:
      - pattern-inside: |
          @Entity
          class $CLASS {
            ...
          }
      - pattern: byte[] $FIELD;
      - metavariable-regex:
          metavariable: $FIELD
          regex: (?i).*(content|bytes|payload|fichier|file|document|facture|pdf|xml).*

  # --- R13 : archivage probant immuable ---

  - id: r13-suppression-objet-contexte-archivage
    languages: [java]
    severity: WARNING
    message: >
      R13 — suppression d'objet S3 dans un composant d'archivage probant :
      les archives sont immuables (Object Lock mode compliance, rétention
      10 ans). Une suppression ne devrait exister nulle part dans ce
      contexte — vérifier qu'il ne s'agit pas d'un contournement de la
      rétention (ou d'un objet mal rangé dans le coffre).
    metadata:
      regle: R13
      reference: docs/regles-conception.md#r13
    patterns:
      - pattern-either:
          - pattern: $S3.deleteObject(...)
          - pattern: $S3.deleteObjects(...)
      - pattern-inside: |
          class $CLASS { ... }
      - metavariable-regex:
          metavariable: $CLASS
          regex: (?i).*(archiv|coffre|probant|vault|worm|scelle).*
